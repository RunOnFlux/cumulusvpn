name: gateway-image

# Build the CumulusVPN gateway container and publish it to the GitHub Container
# Registry (GHCR) — no external registry secrets needed (uses GITHUB_TOKEN).
#
# Tags produced:
#   * push to main            -> :latest  and  :sha-<short>
#   * tag gateway-vX.Y.Z / vX.Y.Z -> :X.Y.Z (+ :X.Y, :X) and :latest
#   * pull request            -> build only (no push), as a smoke test
#
# The published image is ghcr.io/runonflux/cumulusvpn-gateway. Make the GHCR
# *package* public (repo/org Package settings) so Flux nodes can pull it without
# auth — then the app spec just references the tag, no repoauth needed.
#
# NOTE: on-chain registration/deploy to Flux is NOT automated here (needs a
# funded wallet + signing key); run deploy/scripts by hand. See deploy/README.md.

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway-image.yml'
    tags:
      - 'v*'
      - 'gateway-v*'
  pull_request:
    paths:
      - 'gateway/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/runonflux/cumulusvpn-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=match,pattern=gateway-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          # linux/amd64 covers the overwhelmingly x86-64 Flux fleet. Add
          # linux/arm64 here once the Dockerfile is confirmed cross-arch.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
