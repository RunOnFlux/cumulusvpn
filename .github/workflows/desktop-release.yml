name: desktop-release

# CumulusVPN desktop installer for macOS (Apple Silicon), built with tauri-action
# and published to a GitHub Release.
#
# Apple Silicon only for now: Intel Macs are dropped (obsolete), and Windows/Linux
# would need the wireguard-go sidecar cross-compiled first (fetch-wireguard-go.sh
# vendors only aarch64-apple-darwin today) — add those matrix legs later if wanted.
#
# Trigger: push a tag like `desktop-v1.2.3`, or run manually.
#
# Required secret: TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD) for the updater.
# Optional (Gatekeeper-clean .dmg): APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
# APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID. See docs/14-releases.md.

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest # Apple Silicon runner
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # fetch-wireguard-go.sh builds the wireguard-go sidecar from source (pure
      # Go, CGO disabled), so the runner needs a Go toolchain (>= 1.23).
      - name: Setup Go (for the wireguard-go sidecar)
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Install deps + build shared core
        run: |
          yarn install --immutable
          yarn workspace @cumulusvpn/core build

      - name: Provide wireguard-go sidecar (aarch64-apple-darwin, vendored)
        run: bash clients/desktop/scripts/fetch-wireguard-go.sh
        shell: bash

      - name: Build + release (tauri-action)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code-signing / notarization is intentionally OFF for now: the
          # APPLE_* secrets aren't set, and passing them EMPTY makes tauri-action
          # try `security import` with an empty cert and fail. Result: an UNSIGNED
          # .dmg (right-click → Open to bypass Gatekeeper). To enable notarized
          # builds later, add the APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD /
          # APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # repository secrets and re-add them as env here (see docs/14-releases.md).
        with:
          projectPath: clients/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'CumulusVPN Desktop ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
