name: pages

# Publish the static marketing landing page (clients/web/landing/) to GitHub Pages.
# It's a single self-contained index.html — no build, no external assets.
#
# One-time setup: repo → Settings → Pages → Source = "GitHub Actions".
# Custom domain (cumulusvpn.com): set it under Settings → Pages, point DNS
# (CNAME/ALIAS) at the Pages host, and add a `CNAME` file to clients/web/landing/.
#
# NOTE: Pages on a PRIVATE repo needs a paid GitHub plan (Pro/Team/Enterprise);
# on a public repo it is free. And Actions must be unblocked to run at all.

on:
  push:
    branches: [main]
    paths:
      - 'clients/web/landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: clients/web/landing
      - id: deployment
        uses: actions/deploy-pages@v4
