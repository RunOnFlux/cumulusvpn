<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Android adaptive icon BACKGROUND: gradient + subtle glow, full bleed. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1424"/>
      <stop offset="0.55" stop-color="#0C2230"/>
      <stop offset="1" stop-color="#0A2E30"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="512" r="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34E4DA" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#0FB9AE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <ellipse cx="512" cy="512" rx="430" ry="430" fill="url(#glow)"/>
</svg>
