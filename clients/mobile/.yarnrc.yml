# Standalone Yarn project (NOT part of the root workspaces).
# React Native + Yarn PnP is famously brittle (Metro can't resolve the PnP
# runtime), so this app uses the node-modules linker and its own lockfile.
# Inherits nodeLinker/enableGlobalCache from the repo-root .yarnrc.yml too;
# repeated here so `clients/mobile` resolves as its own project root.
nodeLinker: node-modules
enableGlobalCache: true
